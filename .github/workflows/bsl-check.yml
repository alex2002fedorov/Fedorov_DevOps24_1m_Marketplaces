name: BSL Code Analysis

on:
  pull_request:
    branches:
      - main
    paths:
      - 'UT_Marketplaces.Marketplaces/**'

jobs:
  bsl-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          ls -la UT_Marketplaces.Marketplaces || true
          ls -la UT_Marketplaces.Marketplaces/src || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show Java version
        run: java -version

      - name: Download BSL Language Server
        run: |
          curl -L -o bsl-language-server.jar \
            https://github.com/1c-syntax/bsl-language-server/releases/download/v0.29.0/bsl-language-server-0.29.0-exec.jar
          ls -lh bsl-language-server.jar

      - name: Run BSL analysis and generate JSON report
        run: |
          mkdir -p bsl-report
          java -jar bsl-language-server.jar analyze \
            --srcDir UT_Marketplaces.Marketplaces/src \
            --outputDir bsl-report \
            --reporter json

      - name: Check for errors in JSON report
        run: |
          # Проверяем, есть ли в отчёте диагностики с severity: "Error"
          if grep -q '"severity": *"Eror"' bsl-report/*.json; then
            echo "❌ Обнаружены ошибки уровня Error в коде. См. артефакт отчёта."
            echo "Количество ошибок: $(grep -c '"severity": *"Error"' bsl-report/*.json || true)"
            exit 1
          else
            echo "✅ Ошибок уровня Error не найдено."
          fi

      - name: Upload BSL report artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bsl-json-report
          path: bsl-report
