name: BSL Code Analysis

on:
  pull_request:
    branches:
      - main

jobs:
  bsl-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          ls -la UT_Marketplaces.Marketplaces || true

      - name: Run BSL analysis
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            1csyntax/bsl-language-server:latest \
            analyze /workspace/UT_Marketplaces.Marketplaces

      - name: Upload analysis artifacts if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bsl-analysis-artifacts
          path: |
            ./.bsl
            ./bsl-report.json
          if-no-files-found: ignore