name: BSL Code Analysis

on:
  pull_request:
    branches:
      - main

jobs:
  bsl-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          ls -la UT_Marketplaces.Marketplaces || true

      - name: Show Docker image help
        run: |
          docker run --rm 1csyntax/bsl-language-server:latest --help || true

      - name: Show Docker image filesystem
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            1csyntax/bsl-language-server:latest \
            sh -c "ls -la /workspace && ls -la /workspace/UT_Marketplaces.Marketplaces || true" || true