name: BSL Code Analysis

on:
  pull_request:
    branches:
      - main

jobs:
  bsl-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -la
          ls -la UT_Marketplaces.Marketplaces || true
          ls -la UT_Marketplaces.Marketplaces/src || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Show Java version
        run: java -version

      - name: Download BSL Language Server
        run: |
          curl -L -o bsl-language-server.jar https://github.com/1c-syntax/bsl-language-server/releases/download/v0.29.0/bsl-language-server-0.29.0-exec.jar
          ls -lh bsl-language-server.jar
          file bsl-language-server.jar || true

      - name: Show BSL Language Server help
        run: |
          java -jar bsl-language-server.jar --help

      - name: Run BSL analysis
        run: |
          java -jar bsl-language-server.jar analyze UT_Marketplaces.Marketplaces/src