name: Deploy Extension to Production

on:
  workflow_dispatch:
    inputs:
      start_time:
        description: 'Время начала обновления (HH:MM, например 23:00)'
        required: true
        default: '23:00'
        type: string
      lock_before_minutes:
        description: 'За сколько минут до обновления заблокировать базу'
        required: false
        default: '30'
        type: string

jobs:
  deploy:
    name: "Обновление расширения на продуктивной базе"
    runs-on: self-hosted

    env:
      SOURCE_DIR: "UT_Marketplaces.Marketplaces"
      BUILD_DIR: "build"
      XML_DIR: "build\\xml_output"
      EDT_WS: "C:\\EDT_Workspace_CI"
      EDT_CLI: ${{ vars.EDT_PATH }}

    steps:

      - name: "🕐 Расчёт времени и установка блокировки"
        id: lock
        shell: powershell
        env:
          RAC_PATH: ${{ secrets.V8_PATH }}
          CLUSTER: ${{ secrets.CLUSTER_ID }}
          IB_ID: ${{ secrets.PROD_INFOBASE_ID }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          $targetTime = '${{ github.event.inputs.start_time }}'
          $lockBefore = [int]'${{ github.event.inputs.lock_before_minutes }}'

          $parts = $targetTime.Split(':')
          if ($parts.Count -ne 2) {
            Write-Host 'ERROR: wrong time format, use HH:MM'
            exit 1
          }

          $targetHour = [int]$parts[0]
          $targetMinute = [int]$parts[1]

          if ($targetHour -lt 0 -or $targetHour -gt 23 -or $targetMinute -lt 0 -or $targetMinute -gt 59) {
            Write-Host 'ERROR: wrong time value'
            exit 1
          }

          $now = Get-Date
          $updateStart = Get-Date -Hour $targetHour -Minute $targetMinute -Second 0

          if ($updateStart -le $now) {
            $updateStart = $updateStart.AddDays(1)
          }

          $lockFrom = $updateStart.AddMinutes(-$lockBefore)
          $lockTo = $updateStart.AddMinutes(60)

          if ($lockFrom -le $now) {
            Write-Host 'ERROR: lock time is in the past, increase start_time or decrease lock_before_minutes'
            exit 1
          }

          $lockFromStr = $lockFrom.ToString('yyyy-MM-ddTHH:mm:00')
          $lockToStr = $lockTo.ToString('yyyy-MM-ddTHH:mm:00')
          $fromDisp = $lockFrom.ToString('HH:mm')
          $toDisp = $lockTo.ToString('HH:mm')
          $updateDisp = $updateStart.ToString('HH:mm')

          Write-Host '========================================'
          Write-Host ('  Now:          ' + $now.ToString('HH:mm'))
          Write-Host ('  Lock from:    ' + $fromDisp)
          Write-Host ('  Update start: ' + $updateDisp)
          Write-Host ('  Lock to:      ' + $toDisp)
          Write-Host '========================================'

          $cleanPwd = $env:PWD
          if ($cleanPwd -eq ' ') { $cleanPwd = '' }

          $deniedMsg = 'Planovoe obnovlenie v ' + $updateDisp + '. Blokirovka s ' + $fromDisp + ' do ' + $toDisp + '.'

          $racArgs = @(
            'infobase', 'update',
            ('--cluster=' + $env:CLUSTER),
            ('--infobase=' + $env:IB_ID),
            ('--infobase-user=' + $env:USER),
            ('--infobase-pwd=' + $cleanPwd),
            '--sessions-deny=on',
            '--permission-code=UpdateExtCI',
            ('--denied-from=' + $lockFromStr),
            ('--denied-to=' + $lockToStr),
            ('--denied-message=' + $deniedMsg),
            'localhost:1545'
          )

          & (Join-Path $env:RAC_PATH 'rac.exe') @racArgs

          if ($LASTEXITCODE -ne 0) {
            Write-Host 'ERROR: Failed to set lock'
            'lock_ok=false' | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 1
          }

          'lock_ok=true' | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host 'Lock scheduled successfully'
          Write-Host ('Users will see: ' + $deniedMsg)

          $waitToUpdate = ($updateStart - (Get-Date)).TotalSeconds
          $waitRounded = [math]::Max(0, [math]::Round($waitToUpdate))

          Write-Host ('Waiting ' + $waitRounded + ' seconds until ' + $updateDisp + '...')
          if ($waitRounded -gt 0) {
            Start-Sleep -Seconds $waitRounded
          }

          Write-Host ('Update starting at: ' + (Get-Date).ToString('HH:mm:ss'))

      - name: "🚫 Завершение активных сеансов"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: powershell
        env:
          RAC_PATH: ${{ secrets.V8_PATH }}
          CLUSTER: ${{ secrets.CLUSTER_ID }}
          IB_ID: ${{ secrets.PROD_INFOBASE_ID }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          $cleanPwd = $env:PWD
          if ($cleanPwd -eq ' ') { $cleanPwd = '' }
          $rac = Join-Path $env:RAC_PATH 'rac.exe'

          Write-Host 'Getting active sessions...'

          $sessions = & $rac session list `
            ('--cluster=' + $env:CLUSTER) `
            ('--infobase=' + $env:IB_ID) `
            ('--infobase-user=' + $env:USER) `
            ('--infobase-pwd=' + $cleanPwd) `
            'localhost:1545'

          $sessionIds = @()
          foreach ($line in $sessions) {
            if ($line -match '^session\s*:\s*(.+)$') {
              $sessionIds += $matches[1].Trim()
            }
          }

          Write-Host ('Active sessions found: ' + $sessionIds.Count)

          foreach ($sid in $sessionIds) {
            Write-Host ('Terminating session: ' + $sid)
            & $rac session terminate `
              ('--cluster=' + $env:CLUSTER) `
              ('--session=' + $sid) `
              ('--infobase-user=' + $env:USER) `
              ('--infobase-pwd=' + $cleanPwd) `
              'localhost:1545'
          }

          if ($sessionIds.Count -gt 0) {
            Write-Host 'Waiting 30 seconds for sessions to close...'
            Start-Sleep -Seconds 30
          }

          Write-Host 'All sessions terminated'

      - name: "📥 Получение кода из main"
        if: steps.lock.outputs.lock_ok == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: "🔧 Git safe.directory"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: powershell
        run: |
          git config --global --add safe.directory $env:GITHUB_WORKSPACE

      - name: "📋 Информация о сборке"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: powershell
        run: |
          Write-Host '========================================'
          Write-Host '  Deploy Extension to PRODUCTION'
          Write-Host '========================================'
          Write-Host ('Branch:     main')
          Write-Host ('Commit:     ' + $env:GITHUB_SHA)
          Write-Host ('Date:       ' + (Get-Date).ToString('yyyy-MM-dd HH:mm:ss'))
          Write-Host ('Start time: ' + '${{ github.event.inputs.start_time }}')
          Write-Host '========================================'

      - name: "🧹 Подготовка"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        run: |
          taskkill /f /im 1cv8.exe || echo No 1cv8 processes
          ping -n 6 127.0.0.1 > nul
          if exist "%BUILD_DIR%" rmdir /s /q "%BUILD_DIR%"
          mkdir "%BUILD_DIR%"
          mkdir "%XML_DIR%"
          mkdir "%BUILD_DIR%\logs"
          if exist "%EDT_WS%" rmdir /s /q "%EDT_WS%"
          mkdir "%EDT_WS%"
          echo Folders ready

      - name: "🔄 Конвертация EDT → XML"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        run: |
          echo ========================================
          echo   Converting EDT to XML...
          echo ========================================

          "%EDT_CLI%\1cedtcli.exe" ^
            -data "%EDT_WS%" ^
            -timeout 600 ^
            -vmargs -Xmx4g ^
            -command export ^
            --project "%CD%\%SOURCE_DIR%" ^
            --configuration-files "%CD%\%XML_DIR%"

          if not exist "%XML_DIR%\Configuration.xml" (
            echo ERROR: Conversion failed
            exit /b 1
          )
          echo Conversion successful

      - name: "🩹 Патч XML: исправление StandardCommand"
        if: steps.lock.outputs.lock_ok == 'true'
        shell: powershell
        run: |
          $xmlRoot = Join-Path $env:GITHUB_WORKSPACE $env:XML_DIR
          $readEnc = New-Object System.Text.UTF8Encoding($false)
          $writeEnc = New-Object System.Text.UTF8Encoding($true)
          $pattern = '<CommandName>Form\.Item\.[^<]+\.StandardCommand\.SelectAll</CommandName>'
          $replacement = '<CommandName>0</CommandName>'
          $count = 0
          Write-Host ('XML root: ' + $xmlRoot)
          if (-not (Test-Path -LiteralPath $xmlRoot)) {
            Write-Host ('ERROR: XML folder not found: ' + $xmlRoot)
            exit 1
          }
          $files = Get-ChildItem -Path $xmlRoot -Recurse -Filter *.xml -File
          Write-Host ('Files found: ' + $files.Count)
          foreach ($file in $files) {
            $content = [System.IO.File]::ReadAllText($file.FullName, $readEnc)
            if ([System.Text.RegularExpressions.Regex]::IsMatch($content, $pattern)) {
              $new = [System.Text.RegularExpressions.Regex]::Replace($content, $pattern, $replacement)
              [System.IO.File]::WriteAllText($file.FullName, $new, $writeEnc)
              Write-Host ('Patched: ' + $file.Name)
              $count = $count + 1
            }
          }
          Write-Host ('Total patched: ' + $count)

      - name: "💾 Резервная копия текущего расширения"
        id: backup
        if: steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.PROD_SERVER }}
          BASE: ${{ secrets.PROD_BASE }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
          EXT_NAME: ${{ secrets.PROD_EXTENSION_NAME }}
          BACKUP_PATH: ${{ secrets.PROD_BACKUP_PATH }}
        run: |
          echo ========================================
          echo   Backup current extension...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          if not exist "%BACKUP_PATH%" mkdir "%BACKUP_PATH%"

          for /f "tokens=1-3 delims=." %%a in ("%DATE:~0,10%") do (
            set "DAY=%%a"
            set "MONTH=%%b"
            set "YEAR=%%c"
          )
          for /f "tokens=1-2 delims=:." %%a in ("%TIME: =0%") do (
            set "HOUR=%%a"
            set "MINUTE=%%b"
          )

          set "BACKUP_FILE=%BACKUP_PATH%\%EXT_NAME%_%YEAR%%MONTH%%DAY%_%HOUR%%MINUTE%.cfe"
          echo Backup file: %BACKUP_FILE%

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /DumpCfg "%BACKUP_FILE%" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\backup.log"

          echo Backup exit code: %ERRORLEVEL%
          if exist "%BUILD_DIR%\logs\backup.log" type "%BUILD_DIR%\logs\backup.log"

          if exist "%BACKUP_FILE%" (
            for %%A in ("%BACKUP_FILE%") do (
              if %%~zA GTR 100 (
                echo backup_ok=true>> %GITHUB_OUTPUT%
                echo backup_file=%BACKUP_FILE%>> %GITHUB_OUTPUT%
                echo Backup OK: %%~zA bytes
              ) else (
                echo backup_ok=false>> %GITHUB_OUTPUT%
                echo WARNING: Backup too small
              )
            )
          ) else (
            echo backup_ok=false>> %GITHUB_OUTPUT%
            echo WARNING: Backup not created
          )

          echo Backup step completed
          exit /b 0

      - name: "📦 Загрузка нового расширения"
        id: load
        if: steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.PROD_SERVER }}
          BASE: ${{ secrets.PROD_BASE }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
          EXT_NAME: ${{ secrets.PROD_EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   Loading new extension...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /LoadConfigFromFiles "%CD%\%XML_DIR%" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\load.log"

          set LOAD_EXIT=%ERRORLEVEL%
          echo Load exit code: %LOAD_EXIT%
          if exist "%BUILD_DIR%\logs\load.log" type "%BUILD_DIR%\logs\load.log"

          if %LOAD_EXIT% EQU 0 (
            echo load_ok=true>> %GITHUB_OUTPUT%
          ) else if %LOAD_EXIT% EQU 1 (
            echo load_ok=true>> %GITHUB_OUTPUT%
          ) else (
            echo load_ok=false>> %GITHUB_OUTPUT%
            exit /b 1
          )

      - name: "🚀 Применение изменений"
        id: update
        if: steps.load.outputs.load_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.PROD_SERVER }}
          BASE: ${{ secrets.PROD_BASE }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
          EXT_NAME: ${{ secrets.PROD_EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   Applying changes...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          echo Step 1: UpdateDBCfg for extension...
          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\updatedb_ext.log"

          set UPDATE_EXT_EXIT=%ERRORLEVEL%
          echo UpdateDBCfg Extension exit code: %UPDATE_EXT_EXIT%
          if exist "%BUILD_DIR%\logs\updatedb_ext.log" type "%BUILD_DIR%\logs\updatedb_ext.log"

          echo Step 2: UpdateDBCfg for main configuration...
          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg ^
            /Out "%CD%\%BUILD_DIR%\logs\updatedb.log"

          set UPDATE_EXIT=%ERRORLEVEL%
          echo UpdateDBCfg exit code: %UPDATE_EXIT%
          if exist "%BUILD_DIR%\logs\updatedb.log" type "%BUILD_DIR%\logs\updatedb.log"

          if %UPDATE_EXT_EXIT% EQU 0 (
            if %UPDATE_EXIT% EQU 0 (
              echo update_ok=true>> %GITHUB_OUTPUT%
              echo Update successful
            ) else (
              echo update_ok=false>> %GITHUB_OUTPUT%
              echo ERROR: Main config update failed
            )
          ) else (
            echo update_ok=false>> %GITHUB_OUTPUT%
            echo ERROR: Extension update failed
          )

      - name: "⚠️ ОТКАТ: восстановление предыдущей версии"
        if: >
          steps.update.outputs.update_ok == 'false' &&
          steps.backup.outputs.backup_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.PROD_SERVER }}
          BASE: ${{ secrets.PROD_BASE }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
          EXT_NAME: ${{ secrets.PROD_EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   ROLLBACK: Restoring previous version
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /LoadCfg "${{ steps.backup.outputs.backup_file }}" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_load.log"

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_update_ext.log"

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_update.log"

          echo ROLLBACK COMPLETED

      - name: "🔓 Снятие блокировки"
        if: always()
        shell: cmd
        env:
          RAC_PATH: ${{ secrets.V8_PATH }}
          CLUSTER: ${{ secrets.CLUSTER_ID }}
          IB_ID: ${{ secrets.PROD_INFOBASE_ID }}
          USER: ${{ secrets.PROD_DB_USER }}
          PWD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          "%RAC_PATH%\rac.exe" infobase update ^
            --cluster=%CLUSTER% ^
            --infobase=%IB_ID% ^
            --infobase-user=%USER% ^
            --infobase-pwd=%CLEAN_PWD% ^
            --sessions-deny=off ^
            --permission-code= ^
            --denied-message= ^
            --denied-from= ^
            --denied-to= ^
            localhost:1545

          echo Session lock removed

      - name: "📤 Сохранение логов"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-prod-logs-${{ github.run_number }}
          path: build/logs/*.log
          retention-days: 90

      - name: "🧹 Очистка"
        if: always()
        shell: cmd
        run: |
          if exist "%XML_DIR%" rmdir /s /q "%XML_DIR%"
          echo Cleanup completed

      - name: "❌ Ошибка обновления"
        if: steps.update.outputs.update_ok == 'false'
        shell: cmd
        run: |
          echo ========================================
          echo   PRODUCTION UPDATE FAILED
          echo   Previous version restored from backup
          echo   Check logs in artifacts
          echo ========================================
          exit /b 1