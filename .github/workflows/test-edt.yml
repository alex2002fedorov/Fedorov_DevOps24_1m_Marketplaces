name: Test EDT

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Test EDT path
        shell: cmd
        run: |
          echo EDT_CLI=${{ vars.EDT_PATH }}
          echo.
          dir "${{ vars.EDT_PATH }}\1cedtcli.exe"
          echo.
          echo Testing launch...
          "${{ vars.EDT_PATH }}\1cedtcli.exe" -data "C:\EDT_Workspace_CI" -command version