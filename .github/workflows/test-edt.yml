name: Test EDT

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    env:
      EDT_CLI: ${{ vars.EDT_PATH }}
    steps:
      - name: Test EDT path
        shell: cmd
        run: |
          echo EDT_CLI=%EDT_CLI%
          echo.
          dir "%EDT_CLI%\1cedtcli.exe"
          echo.
          echo Testing launch...
          "%EDT_CLI%\1cedtcli.exe" -data "C:\EDT_Workspace_CI" -command version