name: Deploy Extension to Test

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      skip_check:
        description: 'Обновить даже без изменений'
        required: false
        default: 'false'
        type: boolean
      lock_delay_minutes:
        description: 'Через сколько минут заблокировать базу'
        required: false
        default: '30'
        type: string
      lock_duration_minutes:
        description: 'Длительность окна обновления (минут)'
        required: false
        default: '30'
        type: string

jobs:
  deploy:
    name: "Обновление расширения на тестовой базе"
    runs-on: self-hosted

    env:
      SOURCE_DIR: "UT_Marketplaces.Marketplaces"
      BUILD_DIR: "build"
      XML_DIR: "build\\xml_output"
      EDT_WS: "C:\\EDT_Workspace_CI"
      EDT_CLI: ${{ vars.EDT_PATH }}
      LOCK_DELAY: ${{ github.event.inputs.lock_delay_minutes || '30' }}
      LOCK_DURATION: ${{ github.event.inputs.lock_duration_minutes || '30' }}

    steps:

      - name: "📥 Получение кода из develop"
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: "🔍 Проверка наличия изменений"
        id: changes
        shell: powershell
        run: |
          $skipCheck = "${{ github.event.inputs.skip_check }}"

          if ($skipCheck -eq "true") {
            "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Forced deploy - skipping change check"
            exit 0
          }

          $result = git log --oneline --since="12 hours ago" -- $env:SOURCE_DIR
          if ($result) {
            $count = ($result | Measure-Object -Line).Lines
          } else {
            $count = 0
          }

          Write-Host "Commits in last 12 hours: $count"

          if ($count -gt 0) {
            "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Changes found:"
            $result
          } else {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No changes - skipping deploy"
          }

      - name: "⏹️ Пропуск — нет изменений"
        if: steps.changes.outputs.has_changes != 'true'
        shell: cmd
        run: |
          echo ========================================
          echo   No changes detected. Skipping deploy.
          echo ========================================

      - name: "📋 Информация о сборке"
        if: steps.changes.outputs.has_changes == 'true'
        shell: cmd
        run: |
          echo ========================================
          echo   Deploy Extension to Test
          echo ========================================
          echo Branch: develop
          echo Commit: %GITHUB_SHA%
          echo Date: %DATE% %TIME%
          echo Trigger: ${{ github.event_name }}
          echo Lock delay: %LOCK_DELAY% min
          echo Lock duration: %LOCK_DURATION% min
          echo ========================================

      - name: "🧹 Подготовка"
        if: steps.changes.outputs.has_changes == 'true'
        shell: cmd
        run: |
          taskkill /f /im 1cv8.exe || echo No 1cv8 processes
          ping -n 6 127.0.0.1 > nul
          if exist "%BUILD_DIR%" rmdir /s /q "%BUILD_DIR%"
          mkdir "%BUILD_DIR%"
          mkdir "%XML_DIR%"
          mkdir "%BUILD_DIR%\logs"
          if not exist "%EDT_WS%" mkdir "%EDT_WS%"
          echo Folders ready

      - name: "🔄 Конвертация EDT → XML"
        if: steps.changes.outputs.has_changes == 'true'
        shell: cmd
        run: |
          echo ========================================
          echo   Converting EDT to XML...
          echo ========================================

          "%EDT_CLI%\1cedtcli.exe" ^
            -data "%EDT_WS%" ^
            -timeout 600 ^
            -vmargs -Xmx4g ^
            -command export ^
            --project "%CD%\%SOURCE_DIR%" ^
            --configuration-files "%CD%\%XML_DIR%"

          if not exist "%XML_DIR%\Configuration.xml" (
            echo ERROR: Conversion failed
            exit /b 1
          )
          echo Conversion successful

      - name: "⏳ Установка блокировки и ожидание"
        id: lock
        if: steps.changes.outputs.has_changes == 'true'
        shell: powershell
        env:
          RAC_PATH: ${{ secrets.V8_PATH }}
          CLUSTER: ${{ secrets.CLUSTER_ID }}
          IB_ID: ${{ secrets.TEST_INFOBASE_ID }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          $cleanPwd = $env:PWD
          if ($cleanPwd -eq " ") { $cleanPwd = "" }

          $now = Get-Date
          $lockFrom = $now.AddMinutes([int]$env:LOCK_DELAY)
          $lockTo = $lockFrom.AddMinutes([int]$env:LOCK_DURATION)

          $lockFromStr = $lockFrom.ToString("yyyy-MM-ddTHH:mm:00")
          $lockToStr = $lockTo.ToString("yyyy-MM-ddTHH:mm:00")
          $fromDisp = $lockFrom.ToString("HH:mm")
          $toDisp = $lockTo.ToString("HH:mm")

          Write-Host "========================================"
          Write-Host "  Lock: $fromDisp - $toDisp"
          Write-Host "========================================"

          $deniedMsg = "Planovoe obnovlenie rasshireniya. Blokirovka s $fromDisp do $toDisp."

          $racArgs = @(
            "infobase", "update",
            "--cluster=$($env:CLUSTER)",
            "--infobase=$($env:IB_ID)",
            "--infobase-user=$($env:USER)",
            "--infobase-pwd=$cleanPwd",
            "--sessions-deny=on",
            "--permission-code=UpdateExtCI",
            "--denied-from=$lockFromStr",
            "--denied-to=$lockToStr",
            "--denied-message=$deniedMsg",
            "localhost:1545"
          )

          & "$($env:RAC_PATH)\rac.exe" @racArgs

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to set lock"
            "lock_ok=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 1
          }

          "lock_ok=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Lock set successfully"

          Write-Host "Waiting $($env:LOCK_DELAY) minutes for users to finish..."
          Start-Sleep -Seconds ([int]$env:LOCK_DELAY * 60)

          Write-Host "Lock active. Waiting 1 min for sessions to close..."
          Start-Sleep -Seconds 60

          Write-Host "Wait completed"

      - name: "💾 Резервная копия текущего расширения"
        id: backup
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.TEST_SERVER }}
          BASE: ${{ secrets.TEST_BASE }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
          EXT_NAME: ${{ secrets.EXTENSION_NAME }}
          BACKUP_PATH: ${{ secrets.BACKUP_PATH }}
        run: |
          echo ========================================
          echo   Backup current extension...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          if not exist "%BACKUP_PATH%" mkdir "%BACKUP_PATH%"

          for /f "tokens=1-3 delims=." %%a in ("%DATE:~0,10%") do (
            set "DAY=%%a"
            set "MONTH=%%b"
            set "YEAR=%%c"
          )
          for /f "tokens=1-2 delims=:." %%a in ("%TIME: =0%") do (
            set "HOUR=%%a"
            set "MINUTE=%%b"
          )

          set "BACKUP_FILE=%BACKUP_PATH%\%EXT_NAME%_%YEAR%%MONTH%%DAY%_%HOUR%%MINUTE%.cfe"
          echo Backup file: %BACKUP_FILE%

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /DumpCfg "%BACKUP_FILE%" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\backup.log"

          echo Backup exit code: %ERRORLEVEL%
          if exist "%BUILD_DIR%\logs\backup.log" type "%BUILD_DIR%\logs\backup.log"

          if exist "%BACKUP_FILE%" (
            for %%A in ("%BACKUP_FILE%") do (
              if %%~zA GTR 100 (
                echo backup_ok=true>> %GITHUB_OUTPUT%
                echo backup_file=%BACKUP_FILE%>> %GITHUB_OUTPUT%
                echo Backup OK: %%~zA bytes
              ) else (
                echo backup_ok=false>> %GITHUB_OUTPUT%
                echo WARNING: Backup too small
              )
            )
          ) else (
            echo backup_ok=false>> %GITHUB_OUTPUT%
            echo WARNING: Backup not created
          )

          powershell -Command "Get-ChildItem '%BACKUP_PATH%\%EXT_NAME%_*.cfe' | Sort-Object LastWriteTime -Descending | Select-Object -Skip 10 | Remove-Item -Force"

          echo Backup step completed
          exit /b 0

      - name: "📦 Загрузка нового расширения"
        id: load
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          steps.lock.outputs.lock_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.TEST_SERVER }}
          BASE: ${{ secrets.TEST_BASE }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
          EXT_NAME: ${{ secrets.EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   Loading new extension...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /LoadConfigFromFiles "%CD%\%XML_DIR%" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\load.log"

          set LOAD_EXIT=%ERRORLEVEL%
          echo Load exit code: %LOAD_EXIT%
          if exist "%BUILD_DIR%\logs\load.log" type "%BUILD_DIR%\logs\load.log"

          if %LOAD_EXIT% EQU 0 (
            echo load_ok=true>> %GITHUB_OUTPUT%
          ) else if %LOAD_EXIT% EQU 1 (
            echo load_ok=true>> %GITHUB_OUTPUT%
          ) else (
            echo load_ok=false>> %GITHUB_OUTPUT%
            exit /b 1
          )

      - name: "🚀 Применение изменений"
        id: update
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          steps.load.outputs.load_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.TEST_SERVER }}
          BASE: ${{ secrets.TEST_BASE }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
          EXT_NAME: ${{ secrets.EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   Applying changes...
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          echo Step 1: UpdateDBCfg for extension...
          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\updatedb_ext.log"

          set UPDATE_EXT_EXIT=%ERRORLEVEL%
          echo UpdateDBCfg Extension exit code: %UPDATE_EXT_EXIT%
          if exist "%BUILD_DIR%\logs\updatedb_ext.log" type "%BUILD_DIR%\logs\updatedb_ext.log"

          echo Step 2: UpdateDBCfg for main configuration...
          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg ^
            /Out "%CD%\%BUILD_DIR%\logs\updatedb.log"

          set UPDATE_EXIT=%ERRORLEVEL%
          echo UpdateDBCfg exit code: %UPDATE_EXIT%
          if exist "%BUILD_DIR%\logs\updatedb.log" type "%BUILD_DIR%\logs\updatedb.log"

          if %UPDATE_EXT_EXIT% EQU 0 (
            if %UPDATE_EXIT% EQU 0 (
              echo update_ok=true>> %GITHUB_OUTPUT%
              echo Update successful
            ) else (
              echo update_ok=false>> %GITHUB_OUTPUT%
              echo ERROR: Main config update failed
            )
          ) else (
            echo update_ok=false>> %GITHUB_OUTPUT%
            echo ERROR: Extension update failed
          )

      - name: "⚠️ ОТКАТ: восстановление предыдущей версии"
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          steps.update.outputs.update_ok == 'false' &&
          steps.backup.outputs.backup_ok == 'true'
        shell: cmd
        env:
          V8_PATH: ${{ secrets.V8_PATH }}
          SERVER: ${{ secrets.TEST_SERVER }}
          BASE: ${{ secrets.TEST_BASE }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
          EXT_NAME: ${{ secrets.EXTENSION_NAME }}
        run: |
          echo ========================================
          echo   ROLLBACK: Restoring previous version
          echo ========================================

          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /LoadCfg "${{ steps.backup.outputs.backup_file }}" ^
            -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_load.log"

          echo Rollback load exit: %ERRORLEVEL%
          if exist "%BUILD_DIR%\logs\rollback_load.log" type "%BUILD_DIR%\logs\rollback_load.log"

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg -Extension %EXT_NAME% ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_update_ext.log"

          echo Rollback ext update exit: %ERRORLEVEL%

          START /WAIT "" "%V8_PATH%\1cv8.exe" DESIGNER ^
            /IBConnectionString "Srvr=%SERVER%;Ref=%BASE%" ^
            /N "%USER%" /P "%CLEAN_PWD%" ^
            /UC UpdateExtCI ^
            /DisableStartupDialogs /DisableStartupMessages ^
            /UpdateDBCfg ^
            /Out "%CD%\%BUILD_DIR%\logs\rollback_update.log"

          echo Rollback update exit: %ERRORLEVEL%
          if exist "%BUILD_DIR%\logs\rollback_update.log" type "%BUILD_DIR%\logs\rollback_update.log"

          echo ROLLBACK COMPLETED

      - name: "🔓 Снятие блокировки"
        if: always()
        shell: cmd
        env:
          RAC_PATH: ${{ secrets.V8_PATH }}
          CLUSTER: ${{ secrets.CLUSTER_ID }}
          IB_ID: ${{ secrets.TEST_INFOBASE_ID }}
          USER: ${{ secrets.DB_USER }}
          PWD: ${{ secrets.DB_PASSWORD }}
        run: |
          set "CLEAN_PWD=%PWD%"
          if "%CLEAN_PWD%"==" " set "CLEAN_PWD="

          "%RAC_PATH%\rac.exe" infobase update ^
            --cluster=%CLUSTER% ^
            --infobase=%IB_ID% ^
            --infobase-user=%USER% ^
            --infobase-pwd=%CLEAN_PWD% ^
            --sessions-deny=off ^
            --permission-code= ^
            --denied-message= ^
            --denied-from= ^
            --denied-to= ^
            localhost:1545

          echo Session lock removed

      - name: "📤 Сохранение логов"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-test-logs-${{ github.run_number }}
          path: build/logs/*.log
          retention-days: 30

      - name: "🧹 Очистка"
        if: always()
        shell: cmd
        run: |
          if exist "%XML_DIR%" rmdir /s /q "%XML_DIR%"
          echo Cleanup completed

      - name: "❌ Ошибка обновления"
        if: >
          steps.changes.outputs.has_changes == 'true' &&
          steps.update.outputs.update_ok == 'false'
        shell: cmd
        run: |
          echo ========================================
          echo   UPDATE FAILED
          echo   Previous version restored from backup
          echo   Check logs in artifacts
          echo ========================================
          exit /b 1
